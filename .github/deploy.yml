name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit --progress=false

      - name: Build Project
        run: |
          npm run build
          echo "Build completed successfully!"

      - name: Prepare Deployment
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Determine Deployment Branch
        id: determine_branch
        run: |
          if [ -z "$(git ls-remote origin refs/heads/gh-pages)" ]; then
            echo "Creating gh-pages branch..."
            git checkout -b gh-pages
            git push origin gh-pages
          else
            echo "Using main branch for deployment..."
            git checkout main
          fi
        continue-on-error: true

      - name: Deploy to GitHub Pages
        if: success() && steps.determine_branch.outputs.return-code == 0
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: your-custom-domain.com
          commit_message: "Deploy website to GitHub Pages [skip ci]"

      - name: Notify Deployment Status
        if: success()
        run: |
          echo "Deployment to GitHub Pages successful!"
        if: failure()
        run: |
          echo "Deployment to GitHub Pages failed!"
